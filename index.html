<!DOCTYPE html>
<html lang="es" dir="ltr" data-theme="light" class="scroll-discreto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="description" content="Launchpad — plantilla empresarial nativa, reactiva y escalable." />

  <title>Launchpad · Plantilla empresarial nativa</title>

  <link rel="apple-touch-icon" sizes="180x180" href="./public/favicons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./public/favicons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./public/favicons/favicon-16x16.png" />
  <link rel="shortcut icon" type="image/x-icon" href="./public/favicons/favicon.ico" />
  <meta name="msapplication-TileImage" content="./public/favicons/mstile-150x150.png" />
  <link rel="manifest" href="./public/manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./src/styles/main.css" />

  <!--
    Configuración global. Equivale a `import.meta.env` de Vite pero leíble por código vanilla.
    Edita estos valores o sobreescríbelos antes de cargar main.js (p. ej. desde Razor/Blade/Spring).
  -->
  <script>
    window.LAUNCHPAD_CONFIG = Object.freeze({
      nombre:   'Launchpad',
      version:  '1.0.0',
      ambiente: 'development',
      api: {
        urlBase: '/api',
        tiempoEspera: 15000,
      },
      auth: {
        cabeceraToken: 'Authorization',
        prefijoToken:  'Bearer',
        margenRenovacionSeg: 60,

        /* Panel decorativo de los layouts split / card.
           Modo default: 'gradiente' (panel oscuro enterprise con burbujas
           animadas, patrón de puntos y stats). Profesional, sin assets externos.

           Otros modos:
           - panelModo: 'imagen'     → con panelImagen: 'public/auth/hero.jpg'
           - panelModo: 'carrusel'   → con panelSlides: [{ urlImg, titulo, sub }, ...]
           - panelModo: 'auto'       → decide solo según los demás campos. */
        panelModo: 'gradiente',

        // Headline + lead del panel (opcional — defaults si no se definen).
        panelTitulo: 'Plantilla empresarial nativa, reactiva y escalable',
        panelLead:   'Equipos en 30+ países confían en Launchpad para sus paneles internos.',

        // Stats del pie (3-4 items recomendados).
        panelStats: [
          { numero: '119+', etiqueta: 'PÁGINAS' },
          { numero: '41',   etiqueta: 'COMPONENTES' },
          { numero: '0',    etiqueta: 'BUILD STEP' },
        ],

        // Para modo carrusel descomenta esto y cambia panelModo a 'auto' o 'carrusel':
        // panelSlides: [
        //   { urlImg: 'https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=1200&q=70',
        //     titulo: 'Construye más rápido', sub: 'Sin build step.' },
        // ],
      },
      ui: {
        temaPorDefecto:    'system',
        idiomaPorDefecto:  'es',
        idiomasSoportados: ['es', 'en'],
        direccion: 'ltr',
      },
      caracteristicas: {
        pwa: false,
        analitica: false,
      },
      modoDemo: true,
    });
  </script>

  <!-- Hidratamos tema y dirección antes del primer paint para evitar FOUC. -->
  <script>
    (function () {
      try {
        var tema = JSON.parse(localStorage.getItem('launchpad.ui.theme'));
        var dir  = JSON.parse(localStorage.getItem('launchpad.ui.dir'));
        var resuelto = (!tema || tema === 'system')
          ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : tema;
        document.documentElement.setAttribute('data-theme', resuelto);
        if (dir) document.documentElement.setAttribute('dir', dir);
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#main">Saltar al contenido</a>
  <!--
    #app arranca vacío: en cold load / F5 el router monta directamente la
    ruta (con esqueleto si la importación tarda). El overlay "Iniciando…"
    sólo se usa explícitamente como transición tras el login (intro.js).
  -->
  <div id="app"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
